spring.application.name=graphql

# ─── PostgreSQL DataSource ────────────────────────────────────────────
# Update these values to match your PostgreSQL installation.
# The database "graphqldb" must already exist:
#   CREATE DATABASE graphqldb;
spring.datasource.url=jdbc:postgresql://localhost:5432/graphqldb
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ─── JPA / Hibernate ─────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# create-drop  → drops & recreates schema on every restart (good for dev)
# update       → updates schema without dropping data
# validate     → only validates, does not modify
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# Spring Boot 4 / Jakarta EE 11 → use jakarta namespace
spring.jpa.properties.hibernate.jakarta.persistence.validation.mode=none

# ─── GraphQL ─────────────────────────────────────────────────────────
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.path=/graphql
spring.graphql.schema.printer.enabled=true
# Allow unlimited depth for nested queries (adjust for production)
spring.graphql.schema.inspection.enabled=true

# ─── Actuator ────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ─── Logging ─────────────────────────────────────────────────────────
logging.level.org.springframework.graphql=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.graphql.demo=DEBUG

